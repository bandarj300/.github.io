name: Render R Markdown Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system libraries
        run: |
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e '
            install.packages(c(
              "distill", "postcards", "rmarkdown",
              "tidyverse", "tidytext", "textdata",
              "ggwordcloud", "psych", "broom",
              "quanteda", "lubridate", "scales", "remotes"
            ), repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")
            remotes::install_github("quanteda/quanteda.corpora")
          '

      - name: Render site
        run: Rscript -e 'rmarkdown::render_site()'

      - name: Commit and push rendered docs
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet || (git commit -m "Auto-render site [skip ci]" && git push)
